<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AquaVision AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-900 text-white font-['Inter'] antialiased flex items-center justify-center min-h-screen">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
            <div class="relative w-16 h-16 flex items-center justify-center bg-white border border-cyan-500/20 rounded-full shadow-lg shadow-cyan-500/10 mb-4 p-2 overflow-hidden">
                <img src="{{ url_for('static', filename='images/examples/logo.png') }}" class="w-full h-full object-contain rounded-full scale-[1.15]" alt="AquaVision AI Logo">
            </div>
            <h2 class="text-3xl font-bold text-center text-cyan-400 font-heading">Login</h2>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            class="mb-4 p-3 rounded-lg text-sm {{ 'bg-red-500/20 text-red-300 border border-red-500' if category == 'error' else 'bg-green-500/20 text-green-300 border border-green-500' }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
            <div>
                <label class="block text-slate-400 mb-2 text-sm">Email Address</label>
                <input type="email" name="email" required
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-400 transition text-white">
            </div>

            <div>
                <label class="block text-slate-400 mb-2 text-sm">Password</label>
                <input type="password" name="password" required
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-400 transition text-white">
            </div>

            <div>
                <label class="block text-slate-400 mb-2 text-sm">Security Check</label>
                <div class="flex items-center gap-4 mb-3">
                    <img src="{{ url_for('captcha_image') }}" alt="Captcha"
                        class="rounded-lg border border-slate-600 h-12 w-auto">
                    <button type="button" onclick="window.location.reload()"
                        class="text-xs text-slate-500 hover:text-cyan-400 underline">Refresh</button>
                </div>
                <input type="text" name="captcha" placeholder="Enter code from image" required
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-400 transition text-white uppercase tracking-widest">
            </div>

            <button type="submit"
                class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-cyan-600/20">
                Log In
            </button>
        </form>

        <div class="mt-6 text-center text-slate-400 text-sm">
            Don't have an account? <a href="{{ url_for('register') }}"
                class="text-cyan-400 hover:underline">Register</a>
        </div>
    </div>

</body>

</html>
